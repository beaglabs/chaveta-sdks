[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robolytics"
version = "1.0.0"
description = "Robolytics Analytics SDK for Robotics CI. Generated from buf.build/beaglabs/robolytics."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = [
    "protobuf>=5.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]

[tool.hatch.build.targets.wheel]
packages = ["robolytics"]
