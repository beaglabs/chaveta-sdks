[package]
name = "robolytics"
version = "1.0.0"
edition = "2021"
description = "Robolytics Analytics SDK for Robotics CI. Generated from buf.build/beaglabs/robolytics."
license = "MIT"

[dependencies]
prost = "0.13"
prost-types = "0.13"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }

[build-dependencies]
prost-build = "0.13"
